name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Root-level scripts in a pnpm workspace need `-w` to disambiguate from
      # per-package scripts.
      - name: Typecheck
        run: pnpm -w run typecheck

      - name: Unit + integration tests
        run: pnpm -w run test

      - name: Boot smoke test (real server process)
        run: pnpm -w run test:smoke

      - name: Install Chromium for reproduction tests
        run: pnpm --filter @helpuit/playwright exec playwright install --with-deps chromium

      - name: Real-browser reproduction tests
        run: pnpm -w run test:browser

  docker:
    name: docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: helpuit:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
